name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Check chat API configuration
        env:
          VITE_CHAT_API_URL: ${{ secrets.VITE_CHAT_API_URL }}
        run: |
          if [ -z "$VITE_CHAT_API_URL" ]; then
            echo "Missing required repository secret: VITE_CHAT_API_URL"
            echo "Set it to the public backend URL ending in /api/chat before deploying."
            exit 1
          fi

      - name: Build
        env:
          VITE_CHAT_API_URL: ${{ secrets.VITE_CHAT_API_URL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
